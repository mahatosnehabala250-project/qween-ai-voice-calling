version: '3.8'

services:
  # Voice AI Agent Service
  voice-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    volumes:
      - ../src:/app/src
      - ../logs:/app/logs
    restart: unless-stopped
    networks:
      - vobiz-network

  # n8n Automation (Self-hosted)
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - vobiz-network

  # Supabase PostgreSQL (Local Development)
  supabase-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vobiz_voice_ai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - vobiz-network

  # Redis for Caching & Session Management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vobiz-network

volumes:
  n8n_data:
  postgres_data:
  redis_data:

networks:
  vobiz-network:
    driver: bridge
